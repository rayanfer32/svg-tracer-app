<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Stroke Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .checkerboard {
      background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
        linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
        linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    #preview-container svg {
      max-width: 100%;
      height: auto;
      display: block;
      margin: auto;
    }
  </style>

</head>

<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

  <div class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-slate-800">SVG Stroke Converter</h1>
      <p class="text-slate-500 mt-2">Convert filled SVGs into clean, stroke-based outlines instantly.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Left Column: Input & Controls -->
      <div class="lg:col-span-5 space-y-6">

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
          <label class="block text-sm font-semibold mb-2">Paste SVG Code</label>
          <textarea id="svg-input"
            class="w-full h-48 p-3 text-xs font-mono border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-slate-50"
            placeholder="&lt;svg ...&gt; ... &lt;/svg&gt;"></textarea>

          <div class="mt-4 flex gap-2">
            <label class="flex-1">
              <span class="sr-only">Upload File</span>
              <input type="file" id="file-upload" accept=".svg"
                class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </label>
          </div>
        </div>

        <!-- Settings Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Customization</h2>

          <div>
            <div class="flex justify-between mb-1">
              <label class="text-sm font-medium">Stroke Width</label>
              <span id="width-val" class="text-xs font-mono text-blue-600">1.5px</span>
            </div>
            <input type="range" id="stroke-width" min="0.1" max="10" step="0.1" value="1.5"
              class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Line Cap</label>
              <select id="line-cap" class="w-full p-2 text-sm border border-slate-300 rounded-md">
                <option value="round">Round</option>
                <option value="butt">Butt</option>
                <option value="square">Square</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Line Join</label>
              <select id="line-join" class="w-full p-2 text-sm border border-slate-300 rounded-md">
                <option value="round">Round</option>
                <option value="bevel">Bevel</option>
                <option value="miter">Miter</option>
              </select>
            </div>
          </div>

          <div class="flex items-center gap-3 py-2">
            <input type="checkbox" id="override-color-toggle" class="w-4 h-4 text-blue-600 border-slate-300 rounded">
            <label for="override-color-toggle" class="text-sm font-medium">Force Single Color</label>
            <input type="color" id="stroke-color" value="#000000" class="h-8 w-12 border-none bg-transparent">
          </div>

          <div class="flex items-center gap-3 py-2">
            <input type="checkbox" id="remove-fill-toggle" checked=""
              class="w-4 h-4 text-blue-600 border-slate-300 rounded">
            <label for="remove-fill-toggle" class="text-sm font-medium text-slate-700">Remove Internal Fills</label>
          </div>
        </div>
      </div>

      <!-- Right Column: Preview & Export -->
      <div class="lg:col-span-7 flex flex-col space-y-6">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
          <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
            <span class="text-sm font-semibold">Live Preview</span>
            <div class="flex gap-2">
              <button id="copy-btn"
                class="px-4 py-1.5 text-xs font-bold bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition">Copy
                Code</button>
              <button id="download-btn"
                class="px-4 py-1.5 text-xs font-bold bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Download
                SVG</button>
            </div>
          </div>

          <div class="flex-1 min-h-[400px] flex items-center justify-center p-8 checkerboard" id="preview-container">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="100%" height="100%">
              <circle cx="12" cy="12" r="10" style="fill: none;" stroke="rgb(59, 130, 246)" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" fill="none"></circle>
              <path d="M12 8v8M8 12h8" style="stroke: white; fill: none;" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" fill="none"></path>
            </svg>
          </div>
        </div>

        <!-- Status Message -->
        <div id="status-msg" class="hidden p-3 rounded-lg text-sm text-center font-medium"></div>
      </div>
    </div>
  </div>

  <script>
    const inputArea = document.getElementById('svg-input');
    const fileUpload = document.getElementById('file-upload');
    const previewContainer = document.getElementById('preview-container');
    const widthRange = document.getElementById('stroke-width');
    const widthVal = document.getElementById('width-val');
    const lineCap = document.getElementById('line-cap');
    const lineJoin = document.getElementById('line-join');
    const colorPicker = document.getElementById('stroke-color');
    const colorToggle = document.getElementById('override-color-toggle');
    const fillToggle = document.getElementById('remove-fill-toggle');
    const copyBtn = document.getElementById('copy-btn');
    const downloadBtn = document.getElementById('download-btn');
    const statusMsg = document.getElementById('status-msg');

    // State
    let currentRawSvg = '';

    window.onload = () => {
      const demoSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" style="fill:#3b82f6;" /><path d="M12 8v8M8 12h8" style="stroke:white; stroke-width:2; stroke-linecap:round;"/></svg>`;
      inputArea.value = demoSvg;
      processSvg();
    };

    fileUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        inputArea.value = event.target.result;
        processSvg();
      };
      reader.readAsText(file);
    });

    [inputArea, widthRange, lineCap, lineJoin, colorPicker, colorToggle, fillToggle].forEach(el => {
      el.addEventListener('input', () => {
        if (el === widthRange) widthVal.textContent = `${widthRange.value}px`;
        processSvg();
      });
    });

    function processSvg() {
      const raw = inputArea.value.trim();
      if (!raw) {
        previewContainer.innerHTML = `<div class="text-slate-400 italic text-center">Enter SVG code to begin</div>`;
        return;
      }

      const parser = new DOMParser();
      const doc = parser.parseFromString(raw, 'image/svg+xml');
      const svgEl = doc.querySelector('svg');

      if (!svgEl || doc.querySelector('parsererror')) {
        previewContainer.innerHTML = `<div class="text-red-500 font-medium">Invalid SVG code</div>`;
        return;
      }

      const shapes = svgEl.querySelectorAll('path, circle, rect, ellipse, polygon, polyline, line');

      shapes.forEach(shape => {
        // Get color from attribute OR from inline style
        let fill = shape.getAttribute('fill');
        let stroke = shape.getAttribute('stroke');

        // Parse inline style if it exists
        if (shape.style.fill) fill = shape.style.fill;
        if (shape.style.stroke) stroke = shape.style.stroke;

        // Handle Fill to Stroke conversion
        if (fill && fill !== 'none') {
          const shouldOverride = colorToggle.checked;
          const newColor = shouldOverride ? colorPicker.value : fill;

          // Set as attribute (clearing style to ensure attribute takes precedence)
          shape.style.stroke = '';
          shape.setAttribute('stroke', newColor);
        }

        // Apply customization settings
        shape.setAttribute('stroke-width', widthRange.value);
        shape.setAttribute('stroke-linecap', lineCap.value);
        shape.setAttribute('stroke-linejoin', lineJoin.value);

        // Clear inline style versions of these to ensure our attributes work
        shape.style.strokeWidth = '';
        shape.style.strokeLinecap = '';
        shape.style.strokeLinejoin = '';

        // Handle Fill removal
        if (fillToggle.checked) {
          shape.style.fill = 'none';
          shape.setAttribute('fill', 'none');
        }
      });

      svgEl.setAttribute('width', '100%');
      svgEl.setAttribute('height', '100%');

      previewContainer.innerHTML = '';
      previewContainer.appendChild(svgEl);
      currentRawSvg = new XMLSerializer().serializeToString(svgEl);
    }

    copyBtn.addEventListener('click', () => {
      if (!currentRawSvg) return;
      const dummy = document.createElement('textarea');
      document.body.appendChild(dummy);
      dummy.value = currentRawSvg;
      dummy.select();
      document.execCommand('copy');
      document.body.removeChild(dummy);
      showStatus('Copied to clipboard!', 'bg-green-100 text-green-700');
    });

    downloadBtn.addEventListener('click', () => {
      if (!currentRawSvg) return;
      const blob = new Blob([currentRawSvg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'outlined-vector.svg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showStatus('Downloaded successfully!', 'bg-blue-100 text-blue-700');
    });

    function showStatus(msg, classes) {
      statusMsg.textContent = msg;
      statusMsg.className = `p-3 rounded-lg text-sm text-center font-medium ${classes}`;
      statusMsg.classList.remove('hidden');
      setTimeout(() => statusMsg.classList.add('hidden'), 3000);
    }
  </script>

</body>

</html>
